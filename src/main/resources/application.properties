spring.application.name=MealMate

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/mealmate?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
server.port=8001

# Run data.sql (ingredient seed data) AFTER Hibernate creates/updates the
# schema, and on every startup - INSERT IGNORE in data.sql makes re-runs safe.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

spring.main.allow-bean-definition-overriding=true

#Jwt seceret-key and expiry time
security.jwt.secret-key=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
jwt.token.access-lifespan=3600000

#CORS - comma separated list of allowed frontend origins
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Recipe imports
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
groq.api-key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:openai/gpt-oss-20b}
groq.base-url=${GROQ_BASE_URL:https://api.groq.com/openai/v1}
